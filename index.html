<!DOCTYPE html>
<html>
<head>
    <title>Omkar Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="cursor"></div>
<nav>
    <h2>Omkar</h2>
    <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#gallery">Gallery</a></li>
        <li><a href="#contact">Contact</a></li>
    </ul>
</nav>

<section id="home" class="section">
    <h1 id="typing"></h1>
    <p>Crafting immersive digital experiences</p>
</section>

<section id="about" class="section reveal">
    <h2>About Me</h2>
    <p>B.Tech student building modern and interactive web projects.</p>
</section>

<section id="projects" class="section reveal">
    <h2>Projects</h2>
    <div class="cards">
        <div class="card">AI4A Project</div>
        <div class="card">Design Thinking</div>
        <div class="card">ACE Project</div>
    </div>
</section>

<section id="gallery" class="section reveal">
    <h2>Gallery</h2>
    <div class="gallery">
        <img src="images/img1.jpg" onclick="openLightbox(this)">
        <img src="images/img2.jpg" onclick="openLightbox(this)">
        <img src="images/img3.jpg" onclick="openLightbox(this)">
    </div>
</section>

<section id="contact" class="section reveal">
    <h2>Contact</h2>
    <p>Email: your@email.com</p>
</section>

<div id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img">
</div>

<script src="script.js"></script>
</body>
</html>
